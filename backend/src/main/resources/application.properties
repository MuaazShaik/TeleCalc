spring.application.name=telecom-charge-calculator
server.port=8080

# Persistent H2 file database
spring.datasource.url=jdbc:h2:file:./telecom-data/db
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.h2.console.enabled=true

# JWT
jwt.secret=TelecomCallChargeCalculator2026SecureRandomKeyForJWTTokenGeneration256Bit
jwt.expiration=86400000

# Holiday API
holiday.country-code=IN
holiday.api-url=https://date.nager.at/api/v3

# Timezone API
timezone.zone=Asia/Kolkata
timezone.api-url=https://worldtimeapi.org/api/timezone
